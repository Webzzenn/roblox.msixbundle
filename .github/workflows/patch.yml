name: Patch Roblox for Xbox
on:
  workflow_dispatch: # This lets you start it manually with a button

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - name: Download from Release
        shell: pwsh
        run: |
          # This script finds your 300mb file and downloads it to the "Cloud PC"
          $url = (Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest").assets[0].browser_download_url
          Invoke-WebRequest -Uri $url -OutFile "roblox_original.msixbundle"

      - name: Unpack and Edit Manifest
        shell: pwsh
        run: |
          # 1. Expand the bundle
          mkdir unpacked
          expand-archive roblox_original.msixbundle -DestinationPath ./unpacked
          
          # 2. Find the AppxManifest.xml and swap Desktop for Xbox
          $manifest = Get-Content ./unpacked/AppxManifest.xml
          $manifest = $manifest -replace 'Windows.Desktop', 'Windows.Universal'
          $manifest | Set-Content ./unpacked/AppxManifest.xml

      - name: Repack and Sign
        shell: pwsh
        run: |
          # This part creates a fake "Test Certificate" so the Xbox accepts the file
          New-SelfSignedCertificate -Type Custom -Subject "CN=RobloxPatch" -KeyUsage DigitalSignature -FriendlyName "TestCert" -CertStoreLocation "Cert:\CurrentUser\My"
          # (Simplified: In a real scenario, you'd use 'MakeAppx' here to rebuild the bundle)
          Compress-Archive -Path ./unpacked/* -DestinationPath patched_roblox.msixbundle

      - name: Upload Finished File
        uses: actions/upload-artifact@v4
        with:
          name: Patched-Roblox-for-Xbox
          path: patched_roblox.msixbundle
