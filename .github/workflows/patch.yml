name: Patch and Sign Roblox
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - name: Download Roblox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*bundle*" --output "C:\roblox_input.msixbundle"

      - name: Patch and Sign
        shell: pwsh
        run: |
          # 1. Find tools
          $sdkPath = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64" | Select-Object -First 1).FullName
          $makeappx = "$sdkPath\makeappx.exe"
          $signtool = "$sdkPath\signtool.exe"

          # 2. Unbundle and Unpack
          & $makeappx unbundle /p "C:\roblox_input.msixbundle" /d "C:\bundle_unpacked" /o
          $innerApp = Get-ChildItem -Path "C:\bundle_unpacked\*.msix" | Sort-Object Length -Descending | Select-Object -First 1
          & $makeappx unpack /p "$($innerApp.FullName)" /d "C:\app_unpacked" /nv /o

          # 3. Patch Manifest
          $manifestPath = "C:\app_unpacked\AppxManifest.xml"
          (Get-Content $manifestPath) -replace 'Windows.Desktop', 'Windows.Universal' | Set-Content $manifestPath

          # 4. Create a Certificate (This is the "ID card" for the app)
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=MyTempCert" -KeyUsage DigitalSignature -FriendlyName "XboxFix" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          
          # 5. Export the Certificate (We need this for the Xbox later)
          Export-Certificate -Cert $cert -FilePath "C:\XboxTrust.cer"

          # 6. Repack and Sign
          & $makeappx pack /d "C:\app_unpacked" /p "C:\patched_signed.msix" /nv /o
          & $signtool sign /fd SHA256 /a /f "C:\XboxTrust.cer" /csp "Microsoft Software Key Storage Provider" "C:\patched_signed.msix"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Patched-And-Cert
          path: |
            C:\patched_signed.msix
            C:\XboxTrust.cer
