      - name: Patch, Match Publisher, and Sign
        shell: pwsh
        run: |
          # 1. Deep Search for the tools (finds the newest version automatically)
          $sdkBin = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*" | Where-Object { $_.Name -like "10.*" } | Sort-Object Name -Descending | Select-Object -First 1
          $makeappx = "$($sdkBin.FullName)\x64\makeappx.exe"
          $signtool = "$($sdkBin.FullName)\x64\signtool.exe"
          
          Write-Host "Using MakeAppx from: $makeappx"
          Write-Host "Using SignTool from: $signtool"

          # 2. Unpack
          & $makeappx unbundle /p "C:\roblox_input.msixbundle" /d "C:\bundle_unpacked" /o
          $innerApp = Get-ChildItem -Path "C:\bundle_unpacked\*.msix" | Sort-Object Length -Descending | Select-Object -First 1
          & $makeappx unpack /p "$($innerApp.FullName)" /d "C:\app_unpacked" /nv /o

          # 3. Patch Manifest
          $manifestPath = "C:\app_unpacked\AppxManifest.xml"
          $content = Get-Content $manifestPath
          $content = $content -replace 'Windows.Desktop', 'Windows.Universal'
          $content = $content -replace 'Publisher="[^"]+"', 'Publisher="CN=MyTempCert"'
          $content | Set-Content $manifestPath

          # 4. Create and Export Certificate
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=MyTempCert" -KeyUsage DigitalSignature -FriendlyName "XboxFix" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          Export-Certificate -Cert $cert -FilePath "C:\XboxTrust.cer"

          # 5. Pack and Sign
          & $makeappx pack /d "C:\app_unpacked" /p "C:\patched_signed.msix" /nv /o
          & $signtool sign /fd SHA256 /a /f "C:\XboxTrust.cer" /csp "Microsoft Software Key Storage Provider" "C:\patched_signed.msix"
