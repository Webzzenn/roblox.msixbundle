name: Patch and Sign Roblox
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - name: Setup Folders
        run: |
          mkdir C:\patch_work
          mkdir C:\patch_work\bundle_unpacked
          mkdir C:\patch_work\app_unpacked

      - name: Download Roblox from Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*bundle*" --output "C:\patch_work\roblox_input.msixbundle"

      - name: Final Patch and Sign Logic
        shell: pwsh
        run: |
          $makeappx = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName

          & "$makeappx" unbundle /p "C:\patch_work\roblox_input.msixbundle" /d "C:\patch_work\bundle_unpacked" /o
          
          $innerApp = Get-ChildItem -Path "C:\patch_work\bundle_unpacked\*.msix" | Sort-Object Length -Descending | Select-Object -First 1
          & "$makeappx" unpack /p "$($innerApp.FullName)" /d "C:\patch_work\app_unpacked" /nv /o
          
          $manifestPath = "C:\patch_work\app_unpacked\AppxManifest.xml"
          [xml]$xml = Get-Content $manifestPath
          $xml.Package.Dependencies.TargetDeviceFamily.Name = "Windows.Universal"
          $xml.Package.Identity.Publisher = "CN=MyTempCert"
          $xml.Save($manifestPath)

          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=MyTempCert" -KeyUsage DigitalSignature -FriendlyName "XboxFix" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          Export-Certificate -Cert $cert -FilePath "C:\patch_work\XboxTrust.cer"

          & "$makeappx" pack /d "C:\patch_work\app_unpacked" /p "C:\patch_work\patched_signed.msix" /nv /o
          & "$signtool" sign /fd SHA256 /a /f "C:\patch_work\XboxTrust.cer" /csp "Microsoft Software Key Storage Provider" "C:\patch_work\patched_signed.msix"

      - name: Upload Finished Files
        uses: actions/upload-artifact@v4
        with:
          name: Roblox-Xbox-Ready
          path: |
            C:\patch_work\patched_signed.msix
            C:\patch_work\XboxTrust.cer
